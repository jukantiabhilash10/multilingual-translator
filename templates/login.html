<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Translator Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.card {
    width: 420px;
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.15);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    color: white;
}

.card h2 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 25px;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    margin-bottom: 10px;
}

.github {
    background: #24292f;
    color: white;
}

.github:hover {
    background: #000;
}

.google {
    background: white;
    color: #444;
}

.google:hover {
    background: #f1f1f1;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
    outline: none;
}

.submit {
    background: #00c6ff;
    color: white;
}

.submit:hover {
    background: #0072ff;
}
</style>
</head>

<body>

<div class="card">
    <h2>🌍 Translator Login</h2>

    <a href="/login/github">
        <button class="btn github">Sign in with GitHub</button>
    </a>

    <a href="/login/google">
        <button class="btn google">Sign in with Google</button>
    </a>

    <hr style="border-color:rgba(255,255,255,0.3); margin:20px 0;">

    <form method="post" action="/login">
        <input name="username" placeholder="Username or Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn submit">Sign In</button>
    </form>
</div>

</body>
</html>
