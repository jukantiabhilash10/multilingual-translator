<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  </head>
  <body style="background:#f6f8fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;">
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:24px;">
      <div style="width:480px; max-width:100%;">
        <div style="text-align:center; margin-bottom:12px;">
          <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="logo" style="width:56px;">
        </div>
        <div style="background:#fff; border:1px solid #e1e4e8; border-radius:8px; box-shadow:0 8px 24px rgba(149, 157, 165, 0.08); padding:20px;">
          <h2 style="margin:6px 0 12px; font-size:20px; font-weight:700; color:#24292f;">Create your account</h2>

          <div style="margin-bottom:14px;">
            <a href="/login/github" class="btn btn-block" style="background:#24292f; color:#fff; border-radius:6px; padding:8px 12px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px;">
              <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="gh" style="width:18px;"> Continue with GitHub
            </a>
            <a href="/login/google" class="btn btn-block" style="background:#fff; color:#24292f; border:1px solid #e1e4e8; border-radius:6px; padding:8px 12px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px;">
              <img src="https://www.gstatic.com/devrel-devsite/prod/vc9a2b4a4b9a5a1b1c2d3e4f5/google.svg" alt="g" style="width:18px;"> Continue with Google
            </a>
            <div style="text-align:center; color:#6a737d; margin:12px 0;">or</div>
          </div>

          <form method="post" action="/register">
            <div class="form-group">
              <label style="font-weight:600; color:#24292f;">Username</label>
              <input class="form-control" name="username" required style="border:1px solid #e1e4e8;">
            </div>
            <div class="form-group">
              <label style="font-weight:600; color:#24292f;">Password</label>
              <input class="form-control" type="password" name="password" required style="border:1px solid #e1e4e8;">
            </div>
            <button class="btn" type="submit" style="width:100%; background:#2ea44f; color:#fff; border-radius:6px; padding:8px 12px; font-weight:700;">Create account</button>
          </form>

          <div style="text-align:center; margin-top:12px; color:#586069; font-size:13px;">
            By continuing, you agree to the Translator terms.
          </div>
        </div>
        <div style="text-align:center; margin-top:12px; color:#6a737d; font-size:12px;">
          Already have an account? <a href="/login" style="color:#0366d6;">Sign in</a>
        </div>
      </div>
    </div>
            </form>
            <div style="text-align:center; margin-top:12px;"><a href="/login">Already have an account? Sign in</a></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
